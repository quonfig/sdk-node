name: Chaos

# Runs the cross-SDK chaos harness (toxiproxy + scenarios from
# integration-test-data/chaos) against sdk-node. Boots api-delivery in
# fixture mode and drives every scenario in scenarios/*.yaml through it.
#
# Two modes:
#   - smoke   : skips 11-null-hypothesis (the 30-minute idle scenario);
#               runs on every push to main + every PR (~18 min wall clock).
#   - full    : every scenario; runs on workflow_dispatch + via the release
#               workflow as a publish gate (~48 min).
#
# Wired via workflow_call so release.yaml can `needs:` it.

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
    inputs:
      mode:
        description: "smoke (skip 11) or full"
        required: false
        type: string
        default: smoke
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke (skip 11) or full"
        required: false
        type: choice
        options: [smoke, full]
        default: smoke

jobs:
  chaos:
    name: Chaos (${{ inputs.mode || 'smoke' }})
    runs-on: ubuntu-latest
    # Smoke ~18 min; full ~48 min. Cap at 75 min to allow for warmup +
    # docker pull. Run will fail fast inside the scenario via its own
    # wall_clock_seconds, so this only kicks in if something hangs.
    timeout-minutes: 75
    steps:
      - name: Checkout sdk-node
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: sdk-node

      - name: Checkout integration-test-data
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: quonfig/integration-test-data
          path: integration-test-data
          # Pinned per the 2026-05-13 reliability audit so the chaos
          # gate moves only when the scenarios are deliberately
          # rev'd. Bump alongside the matching SDK change.
          ref: v2026.05.13

      - name: Checkout api-delivery
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # api-delivery is private; the default GITHUB_TOKEN cannot
          # read it. A PAT or fine-grained token with read access to
          # quonfig/api-delivery must be configured as the repo secret
          # QUONFIG_REPO_TOKEN. Without it this step fails fast and
          # the chaos gate is red — by design, until the secret is
          # provisioned.
          repository: quonfig/api-delivery
          path: api-delivery
          ref: main
          token: ${{ secrets.QUONFIG_REPO_TOKEN }}

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"
          cache-dependency-path: api-delivery/go.sum

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: sdk-node/package-lock.json

      - name: Install sdk-node deps
        working-directory: sdk-node
        run: npm ci

      - name: Verify docker compose available
        run: docker compose version

      - name: Run chaos harness
        working-directory: sdk-node
        env:
          # Smoke skips 11-null-hypothesis (30 min idle). Full suite
          # runs everything. The wrapper honors CHAOS_SKIP.
          CHAOS_SKIP: ${{ inputs.mode == 'full' && '' || '11' }}
        run: ./scripts/run-chaos.sh

      - name: Upload chaos logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chaos-logs-${{ github.run_id }}
          path: |
            sdk-node/.chaos-api-delivery
            sdk-node/chaos-*.log
          if-no-files-found: ignore
          retention-days: 7
