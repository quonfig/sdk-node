name: Test
on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lowest entry is the floor that the test toolchain runs on, not the
        # published engines.node floor. vitest 4 (devDependency, test-only)
        # pulls in rolldown, whose native binding @rolldown/binding-linux-x64-gnu
        # declares engines.node ^20.19.0 — on anything lower npm skips the
        # optional binding and vitest fails to start. 20.19.0 is the lowest
        # Node that runs the vitest 4 toolchain. The published
        # engines.node >=20.9.0 floor is unaffected — SDK consumers do not
        # depend on vitest or rolldown.
        node-version: ["20.19.0", "22", "24"]
    steps:
      - name: Checkout sdk-node
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: sdk-node

      - name: Checkout integration-test-data
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: quonfig/integration-test-data
          path: integration-test-data
          # Pinned to a tag (not main) so a typo in shared YAML can't
          # break every SDK's CI at once. Bump to a newer tag when
          # adopting new test cases. See integration-test-data/RELEASING.md.
          ref: v2026.05.20

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: sdk-node/package-lock.json

      - name: Install
        working-directory: sdk-node
        run: npm ci

      - name: Typecheck
        working-directory: sdk-node
        run: npm run lint

      - name: Run formatter
        working-directory: sdk-node
        run: npm run prettier

      - name: Build
        working-directory: sdk-node
        run: npm run build

      # The test/integration/*.generated.test.ts files are produced by the
      # integration-test-data generator, not hand-written. Generation is a
      # manual step, so a change to the shared YAML (or the generator) that
      # isn't regenerated here would leave these tests stale while CI stayed
      # green against the old copy. Regenerate from the pinned tag, re-run
      # prettier (the generator emits unformatted code), and fail if anything
      # differs from what is committed.
      - name: Check generated integration tests are in sync
        if: matrix.node-version == '24'
        working-directory: sdk-node
        run: |
          (cd ../integration-test-data/generators && npm ci && npm run generate -- --target=node)
          npx prettier --write test/integration/
          git diff --exit-code test/integration/ \
            || { echo "::error::Generated integration tests are out of sync with integration-test-data. Run 'npm run generate -- --target=node' in integration-test-data/generators, run prettier, and commit the result."; exit 1; }

      - name: Test
        working-directory: sdk-node
        run: npm test
