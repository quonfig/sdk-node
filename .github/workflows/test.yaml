name: Test
on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lowest entry tracks the package.json engines.node floor. Bumped
        # 20.9.0 -> 20.12.0 because vitest 4 (devDependency, test-only) uses
        # node:util's styleText, added in Node 20.12. The published
        # engines.node >=20.9.0 floor is unaffected — SDK consumers do not
        # depend on vitest.
        node-version: ["20.12.0", "22", "24"]
    steps:
      - name: Checkout sdk-node
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: sdk-node

      - name: Checkout integration-test-data
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: quonfig/integration-test-data
          path: integration-test-data
          # Pinned to a tag (not main) so a typo in shared YAML can't
          # break every SDK's CI at once. Bump to a newer tag when
          # adopting new test cases. See integration-test-data/RELEASING.md.
          ref: v2026.05.13

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: sdk-node/package-lock.json

      - name: Install
        working-directory: sdk-node
        run: npm ci

      - name: Typecheck
        working-directory: sdk-node
        run: npm run lint

      - name: Run formatter
        working-directory: sdk-node
        run: npm run prettier

      - name: Build
        working-directory: sdk-node
        run: npm run build

      - name: Test
        working-directory: sdk-node
        run: npm test
