name: Test
on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lowest entry is the floor that the test toolchain runs on, not the
        # published engines.node floor. vitest 4 (devDependency, test-only)
        # pulls in rolldown, whose native binding @rolldown/binding-linux-x64-gnu
        # declares engines.node ^20.19.0 — on anything lower npm skips the
        # optional binding and vitest fails to start. 20.19.0 is the lowest
        # Node that runs the vitest 4 toolchain. The published
        # engines.node >=20.9.0 floor is unaffected — SDK consumers do not
        # depend on vitest or rolldown.
        node-version: ["20.19.0", "22", "24"]
    steps:
      - name: Checkout sdk-node
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: sdk-node

      - name: Checkout integration-test-data
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: quonfig/integration-test-data
          path: integration-test-data
          # Pinned to a tag (not main) so a typo in shared YAML can't
          # break every SDK's CI at once. Bump to a newer tag when
          # adopting new test cases. See integration-test-data/RELEASING.md.
          ref: v2026.05.13

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: sdk-node/package-lock.json

      - name: Install
        working-directory: sdk-node
        run: npm ci

      - name: Typecheck
        working-directory: sdk-node
        run: npm run lint

      - name: Run formatter
        working-directory: sdk-node
        run: npm run prettier

      - name: Build
        working-directory: sdk-node
        run: npm run build

      - name: Test
        working-directory: sdk-node
        run: npm test
