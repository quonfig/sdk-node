name: Failover Chaos

# Runs the failover + canonical-ordering chaos rigs (toxiproxy + the
# scenarios-failover/ and scenarios-ordering/ corpus from
# integration-test-data/chaos) against sdk-node. Mirrors sdk-go's
# failover-chaos.yaml; fires on every push to main + every PR alongside the
# existing Chaos workflow (chaos.yaml, single-upstream suite).
#
# Unlike chaos.yaml, the vitest runner (chaos/run-failover-chaos.test.ts) spawns
# its own api-delivery fixture upstream(s) — one upstream behind the
# primary+secondary proxies for failover, two upstreams at divergent
# Meta.generations for ordering — so this job only boots toxiproxy and builds
# the api-delivery binary via scripts/run-failover-chaos.sh. Wall clock ~3 min.
#
# Scenarios gated here: f01-f05 (failover) + o02-o04 (ordering). o01-secondary-
# newer is SKIPPED — it asserts cross-leg "max-wins" (hold the higher generation
# even when the older primary leg is healthy), out of the §5f reject-older scope
# ("no source ranking") and not yet implemented. That behaviour is owned by
# qfg-7h5d.1.14; drop the CHAOS_SKIP below to re-gate o01 once it lands.

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  failover-chaos:
    name: Failover + Ordering Chaos
    # The "Checkout api-delivery" step needs secrets.QUONFIG_REPO_TOKEN to read
    # the private api-delivery repo. Dependabot PRs don't get Actions secrets, so
    # skip the job for them — it's a release gate that still runs on every push
    # to main after merge, and Test gates the PR meanwhile.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    # Suite is ~3 min; cap at 30 to absorb warmup + docker pull. Scenarios fail
    # fast inside the runner via their own wall_clock_seconds, so this only kicks
    # in if something hangs.
    timeout-minutes: 30
    steps:
      - name: Checkout sdk-node
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: sdk-node

      - name: Checkout integration-test-data
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: quonfig/integration-test-data
          path: integration-test-data
          # Pin to the reframed corpus tag that carries the hedge ordering
          # scenarios: o01 (fast primary wins, secondary never contacted),
          # o03 (heal forward), and the new o05 (slow older primary loses to a
          # fast newer secondary). (qfg-7h5d.1.14)
          ref: v2026.06.19.1

      - name: Checkout api-delivery
        # api-delivery is private; the default GITHUB_TOKEN cannot read it. A PAT
        # with read access to quonfig/api-delivery must be configured as the repo
        # secret QUONFIG_REPO_TOKEN. The rigs build api-delivery from source
        # (GOWORK=off) to spawn their fixture upstreams.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: quonfig/api-delivery
          path: api-delivery
          ref: main
          token: ${{ secrets.QUONFIG_REPO_TOKEN }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache-dependency-path: api-delivery/go.sum

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: sdk-node/package-lock.json

      - name: Install sdk-node deps
        working-directory: sdk-node
        run: npm ci

      - name: Verify docker compose available
        run: docker compose version

      - name: Run failover + ordering chaos rigs
        working-directory: sdk-node
        # The parallel-failover hedge (qfg-7h5d.1.14) makes o01 (fast primary
        # wins / cold standby), o03 (heal forward), and o05 (slow older primary
        # loses) all green, so nothing is skipped — clear CHAOS_SKIP. The wrapper
        # also clears its own default.
        env:
          CHAOS_SKIP: ""
        run: ./scripts/run-failover-chaos.sh

      - name: Upload chaos logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: failover-chaos-logs-${{ github.run_id }}
          path: |
            sdk-node/.chaos-api-delivery
            sdk-node/chaos-*.log
          if-no-files-found: ignore
          retention-days: 7
